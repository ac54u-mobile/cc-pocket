<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cc-pocket — Menu Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#08090A;font-family:'Inter',-apple-system,system-ui,sans-serif;color:#ECEDEE;}
  @keyframes dkPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}
  .dk-pulse{animation:dkPulse 1.3s ease-in-out infinite;}
  .dk-row{transition:background .12s ease;}
  .dk-row:hover{background:#1E2125;}
  .dk-btn{transition:background .13s ease, border-color .13s ease, filter .13s ease;}
  .dk-btn:hover{filter:brightness(1.08);}
  .tm-iconbtn:hover{background:#2A2E33;}
  .dk-scroll::-webkit-scrollbar{width:9px;height:9px;}
  .dk-scroll::-webkit-scrollbar-thumb{background:#2A2E33;border-radius:999px;border:2px solid transparent;background-clip:padding-box;}
  .dk-scroll::-webkit-scrollbar-track{background:transparent;}
  a{color:#D97757;}a:hover{color:#C4633F;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="desktop-core.jsx?v=1"></script>
<script type="text/babel" src="menubar.jsx?v=1"></script>
</body>
</html>
