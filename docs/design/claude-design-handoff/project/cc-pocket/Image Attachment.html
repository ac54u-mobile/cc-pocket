<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cc-pocket — Image attachment</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#08090A;font-family:'Inter',-apple-system,system-ui,sans-serif;color:#ECEDEE;}

  /* indeterminate spin */
  @keyframes iaSpin{to{transform:rotate(360deg);}}
  .ia-spin{animation:iaSpin .85s linear infinite;}

  /* shimmer sweep over a compressing thumb (overlay; base stays visible) */
  @keyframes iaShimmer{0%{background-position:-130% 0;}100%{background-position:230% 0;}}
  .ia-shimmer{
    background:linear-gradient(100deg,transparent 18%,rgba(255,255,255,0.12) 50%,transparent 82%);
    background-size:230% 100%;animation:iaShimmer 1.25s ease-in-out infinite;
  }

  /* blink caret */
  @keyframes iaBlink{0%,49%{opacity:1;}50%,100%{opacity:0;}}
  .ia-blink{animation:iaBlink 1.05s steps(1) infinite;}

  @keyframes iaPulse{0%,100%{opacity:1;}50%{opacity:.45;}}
  .ia-pulse{animation:iaPulse 1.25s ease-in-out infinite;}

  /* tray reveal — rests fully visible, only the entrance animates from a clip */
  @keyframes iaTray{from{max-height:0;opacity:.0;}to{max-height:120px;opacity:1;}}
  @media (prefers-reduced-motion: no-preference){
    .ia-tray-anim{animation:iaTray .26s cubic-bezier(.22,1,.36,1);}
  }

  .ia-scroll::-webkit-scrollbar{height:0;width:0;}
  .ia-scroll{scrollbar-width:none;}

  .ia-press{transition:transform .08s ease, background .12s ease, opacity .12s ease;}
  .ia-press:active{transform:scale(.97);}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="ia-core.jsx?v=1"></script>
<script type="text/babel" src="ia-parts.jsx?v=1"></script>
<script type="text/babel" src="ia-app.jsx?v=2"></script>
</body>
</html>
