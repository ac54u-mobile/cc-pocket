<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cc-pocket — Voice input</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#08090A;font-family:'Inter',-apple-system,system-ui,sans-serif;color:#ECEDEE;}

  /* blinking terracotta caret — rests visible */
  @keyframes vBlink{0%,49%{opacity:1;}50%,100%{opacity:0;}}
  .v-blink{animation:vBlink 1.05s steps(1) infinite;}

  @keyframes vPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.82);}}
  .v-pulse{animation:vPulse 1.2s ease-in-out infinite;}

  @keyframes vSpin{to{transform:rotate(360deg);}}
  .v-spin{animation:vSpin .85s linear infinite;}

  /* recording-bar morph in — transform-only so frame 0 is fully VISIBLE
     (the preview freezes CSS animations at frame 0; never rest on opacity:0) */
  @keyframes vMorph{from{transform:translateY(6px);}to{transform:none;}}
  @media (prefers-reduced-motion: no-preference){ .v-morph{animation:vMorph .22s cubic-bezier(.22,1,.36,1);} }

  /* sheet rise — small offset so a frozen frame 0 still shows the sheet in place */
  @keyframes vSheet{from{transform:translateY(16px);}to{transform:none;}}
  @media (prefers-reduced-motion: no-preference){ .v-sheet{animation:vSheet .26s cubic-bezier(.22,1,.36,1);} }

  .v-scroll::-webkit-scrollbar{width:0;height:0;}
  .v-scroll{scrollbar-width:none;}
  .v-press{transition:transform .08s ease, background .12s ease, opacity .12s ease;}
  .v-press:active{transform:scale(.95);}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="voice-core.jsx?v=5"></script>
<script type="text/babel" src="voice-app.jsx?v=6"></script>
</body>
</html>
