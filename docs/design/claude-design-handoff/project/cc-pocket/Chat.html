<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cc-pocket — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #08090A;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
  }
  #root { padding: 28px; }

  /* blinking terracotta streaming caret */
  @keyframes ccBlink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  .cc-caret {
    display: inline-block; width: 9px; height: 1.05em;
    background: #D97757; border-radius: 1.5px;
    margin-left: 2px; vertical-align: text-bottom;
    transform: translateY(2px);
    animation: ccBlink 1.05s steps(1) infinite;
  }

  /* pulsing running dot */
  @keyframes ccPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.45; transform: scale(0.82); } }
  .cc-pulse { animation: ccPulse 1.25s ease-in-out infinite; }

  @keyframes ccSpin { to { transform: rotate(360deg); } }
  .cc-spin { animation: ccSpin 0.9s linear infinite; }

  /* entrance animation intentionally omitted: the preview pauses animations
     at frame 0, so animating from opacity:0 would hide content. Resting state
     must always be fully visible. .cc-in kept as a no-op hook. */

  /* hide scrollbars inside the device */
  .cc-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .cc-scroll { scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="chat-app.jsx?v=11"></script>
</body>
</html>
