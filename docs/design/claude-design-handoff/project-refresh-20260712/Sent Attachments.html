<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cc-pocket — Sent attachments &amp; video player</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#08090A;font-family:'Inter',-apple-system,system-ui,sans-serif;color:#ECEDEE;}
  a{color:#D97757;text-decoration:none;} a:hover{color:#e0906f;}

  @keyframes saPulse{0%,100%{opacity:1;}50%{opacity:.45;}}
  .sa-pulse{animation:saPulse 1.25s ease-in-out infinite;}

  .sa-scroll::-webkit-scrollbar{height:0;width:0;}
  .sa-scroll{scrollbar-width:none;}

  .sa-press{transition:transform .08s ease, opacity .12s ease;}
  .sa-press:active{transform:scale(.98);}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="sent-attach-app.jsx?v=1"></script>
