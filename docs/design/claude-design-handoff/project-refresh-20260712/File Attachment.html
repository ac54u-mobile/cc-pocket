<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cc-pocket — File &amp; video attachment</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#08090A;font-family:'Inter',-apple-system,system-ui,sans-serif;color:#ECEDEE;}
  a{color:#D97757;text-decoration:none;} a:hover{color:#e0906f;}

  @keyframes faSpin{to{transform:rotate(360deg);}}
  .fa-spin svg{animation:faSpin 1.1s linear infinite;}

  @keyframes faPulse{0%,100%{opacity:1;}50%{opacity:.45;}}
  .fa-pulse{animation:faPulse 1.25s ease-in-out infinite;}

  @keyframes faSheet{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion: no-preference){
    .fa-sheet-anim{animation:faSheet .2s cubic-bezier(.22,1,.36,1);transform-origin:bottom center;}
  }

  .fa-scroll::-webkit-scrollbar{height:0;width:0;}
  .fa-scroll{scrollbar-width:none;}

  .fa-press{transition:transform .08s ease, background .12s ease, opacity .12s ease;}
  .fa-press:active{transform:scale(.96);}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="ia-core.jsx?v=1"></script>
<script type="text/babel" src="file-attach.jsx?v=3"></script>
<script type="text/babel" src="file-attach-app.jsx?v=2"></script>
</body>
</html>
