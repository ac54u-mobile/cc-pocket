  }

  .light { width: 12px; height: 12px; border-radius: 999px; }

    font-family: -apple-system, "SF Pro Text", "PingFang SC", sans-serif; }

  .ln .tx { flex: 1; min-width: 0; }

  .acc { color: #D97757; }
  .grn { color: #4FB477; }

</head>

  { t:'gap' },
  { t:'b', s:'我先看 relay 的帧大小限制。' },

  { t:'sgap' },
  { t:'tool', n:'Grep', a:'pattern: "maxFrameSize", path: "relay/"' },
  { t:'r', s:'Found 3 matches' },
  { t:'gap' },
  { t:'b', s:'找到了：relay 的 maxFrame 只有 256KB，大会话的历史帧一发过来就被踢断连接。我把上限改成 4MB，并给超限帧加一条告警日志。' },
  { t:'gap' },
  { t:'tool', n:'Update', a:'relay/src/main/kotlin/net/RelayServer.kt' },
  { t:'r', s:'Updated 2 lines' },
  { t:'sgap' },
  { t:'tool', n:'Bash', a:'./gradlew :relay:test' },
  { t:'r', s:'BUILD SUCCESSFUL in 38s · 24 tests passed' },
  { t:'sgap' },
  { t:'plain', s:'Update Todos' },
  { t:'todo', first:true,  done:true,  s:'定位断连根因（maxFrame 256KB）' },
  { t:'todo', done:true,  s:'上限改为 4MB ＋ 告警日志' },
  { t:'todo', done:false, s:'重新部署 relay 并回归验证' },
  { t:'gap' },
  { t:'spin', s:'Redeploying relay… ', d:'(esc to interrupt · 2m 14s)' },

document.getElementById('lines').innerHTML = L.map(l => {
  if (l.t === 'gap')  return '<div class="gap"></div>';
  if (l.t === 'sgap') return '<div class="sgap"></div>';
  if (l.t === 'user') return '<div class="ln"><span class="pre dim">&gt; </span><span class="tx dim">' + esc(l.s) + '</span></div>';
  if (l.t === 'b')    return '<div class="ln"><span class="pre"><span class="acc">⏺</span> </span><span class="tx">' + esc(l.s) + '</span></div>';
  if (l.t === 'tool') return '<div class="ln"><span class="pre"><span class="acc">⏺</span> </span><span class="tx"><b style="font-weight:600">' + esc(l.n) + '</b><span class="dim">(' + esc(l.a) + ')</span></span></div>';
  if (l.t === 'plain')return '<div class="ln"><span class="pre"><span class="acc">⏺</span> </span><span class="tx">' + esc(l.s) + '</span></div>';
  if (l.t === 'r')    return '<div class="ln dim"><span class="pre">  ⎿  </span><span class="tx">' + esc(l.s) + '</span></div>';
  if (l.t === 'todo') {
    const box = l.done ? '<span class="grn">☒</span>' : '<span class="dim">☐</span>';
    const lead = l.first ? '  ⎿  ' : '     ';
    const cls = l.done ? 'dim' : '';
    return '<div class="ln"><span class="pre dim">' + lead + '</span><span class="tx ' + cls + '">' + box + ' ' + esc(l.s) + '</span></div>';
  }
  if (l.t === 'spin') return '<div class="ln"><span class="pre"><span class="acc">✻</span> </span><span class="tx">' + esc(l.s) + '<span class="dim">' + esc(l.d) + '</span></span></div>';
  return '';
}).join('');
</script>

        (pageInset ? '[data-om-fakepage]{padding:0 !important;background:none !important}' : '') +
        '}';
      document.head.appendChild(ost);
    }
  } catch (e) {}
  // macOS Preview renders Skia-PDF Luminosity soft-masks as opaque grey boxes;
  // swap the CSS that triggers them for Preview-safe forms.
  try {
    for (const el of document.body.querySelectorAll('*')) {
      const cs = getComputedStyle(el);

      if (cs.boxShadow !== 'none' && cs.filter === 'none') {
        const outs = [], kept = [];
        for (const s of cs.boxShadow.split(/,(?![^(]*[)])/)) {
          const t = s.trim();
          const m = t.match(/^(rgba?[(][^)]+[)]) (-?[0-9.]+px) (-?[0-9.]+px) ([0-9.]+px) -?[0-9.]+px$/);
          if (m && parseFloat(m[4]) > 0) outs.push('drop-shadow(' + m[2] + ' ' + m[3] + ' ' + m[4] + ' ' + m[1] + ')');
          else kept.push(t);
        }
        if (outs.length) {
          el.style.setProperty('filter', outs.join(' '), 'important');
          el.style.setProperty('box-shadow', kept.join(', ') || 'none', 'important');
        }
      }

      const mask = cs.maskImage && cs.maskImage !== 'none' ? cs.maskImage : cs.webkitMaskImage;
      if (mask && mask !== 'none' && cs.filter === 'none') el.style.setProperty('filter', 'opacity(1)', 'important');
    }
  } catch (e) {}
  setTimeout(() => { try { window.print(); } catch (e) {} }, 200);
})();
</script>
</body>
</html>
