<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>cc-pocket — design vs shipped</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body { background: #000; }
  body {
    width: 1080px; height: 1440px; position: relative; overflow: hidden;
    font-family: Inter, -apple-system, "PingFang SC", "Hiragino Sans GB", sans-serif;
    background:
      radial-gradient(880px 700px at 50% 46%, rgba(217,119,87,0.07) 0%, transparent 62%),
      #0E0F11;
  }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }

  .col { position: absolute; top: 168px; width: 470px; }
  .col.l { left: 46px; }
  .col.r { left: 564px; }

  /* left: browser-style artboard */
  .artboard { border: 1px solid #2A2E33; border-radius: 12px; overflow: hidden; background: #16181B;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
  .tabbar { height: 38px; background: #1E2125; border-bottom: 1px solid #2A2E33; display: flex; align-items: flex-end; padding: 0 12px; }
  .tab { display: flex; align-items: center; gap: 7px; background: #16181B; border: 1px solid #2A2E33; border-bottom: none;
    border-radius: 8px 8px 0 0; padding: 6px 14px 7px; font-size: 11.5px; color: #9BA1A6; }
  .tab .dot { width: 6px; height: 6px; border-radius: 999px; background: #D97757; }
  .aslot { width: 468px; overflow: hidden; }

  /* right: iPhone frame */
  .iphone { width: 470px; border-radius: 46px; background: #050506; padding: 10px;
    border: 1px solid #2A2E33; box-shadow: 0 24px 60px rgba(0,0,0,0.55); }
  .iscreen { border-radius: 37px; overflow: hidden; background: #0E0F11; position: relative; }
  .statusbar { height: 42px; display: flex; align-items: center; justify-content: space-between;
    padding: 6px 26px 0; position: relative; }
  .clock { font-size: 14px; font-weight: 600; color: #ECEDEE; letter-spacing: 0.2px; }
  .notch { position: absolute; left: 50%; top: 8px; transform: translateX(-50%); width: 116px; height: 26px;
    background: #000; border-radius: 999px; }
  .sicons { display: flex; align-items: center; gap: 6px; }
  .homebar { height: 22px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 7px; }
  .homebar span { width: 118px; height: 4.5px; border-radius: 999px; background: #ECEDEE; opacity: 0.9; }

  /* pills */
  .pill { position: absolute; top: 1224px; width: 470px; display: flex; justify-content: center; }
  .pill.l { left: 46px; } .pill.r { left: 564px; }
  .pill span { background: #16181B; border: 1px solid #2A2E33; border-radius: 999px;
    padding: 9px 22px; font-size: 14.5px; font-weight: 500; color: #9BA1A6; }

  /* ── shared chat screen (design width 420) ── */
  .chat { width: 420px; background: #0E0F11; display: flex; flex-direction: column;
    font-family: Inter, -apple-system, "PingFang SC", sans-serif; }
  .c-top { display: flex; align-items: center; gap: 8px; height: 46px; padding: 0 10px;
    border-bottom: 1px solid #2A2E33; flex-shrink: 0; }
  .c-top .ttl { font-size: 15px; font-weight: 600; color: #ECEDEE; flex: 1; }
  .c-badge { font-family: "JetBrains Mono", monospace; font-size: 11px; color: #9BA1A6;
    border: 1px solid #2A2E33; border-radius: 999px; padding: 3px 9px; }
  .c-body { flex: 1; padding: 16px 16px 12px; display: flex; flex-direction: column; gap: 15px; }
  .c-you { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; color: #6B7177; margin-bottom: 6px; }
  .c-t { font-size: 14.5px; line-height: 22px; color: #ECEDEE; }
  .c-tool { background: #16181B; border: 1px solid #2A2E33; border-radius: 12px; padding: 10px 12px; }
  .c-tool .row { display: flex; gap: 7px; font-family: "JetBrains Mono", monospace; font-size: 11.5px; color: #ECEDEE; }
  .c-tool .row .b { color: #D97757; flex-shrink: 0; }
  .c-tool .row .cmd { word-break: break-all; line-height: 17px; }
  .c-tool .res { display: flex; gap: 7px; font-family: "JetBrains Mono", monospace; font-size: 11px; color: #9BA1A6;
    margin-top: 6px; padding-left: 2px; }
  .caret { display: inline-block; width: 8px; height: 15px; background: #D97757; border-radius: 1.5px;
    margin-left: 2px; vertical-align: text-bottom; transform: translateY(2px); animation: ck 1.05s steps(1) infinite; }
  @keyframes ck { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  .c-comp { flex-shrink: 0; border-top: 1px solid #2A2E33; background: #0E0F11;
    display: flex; align-items: center; gap: 8px; padding: 10px 12px; }
  .c-plus { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .c-field { flex: 1; background: #16181B; border: 1px solid #2A2E33; border-radius: 12px;
    padding: 11px 14px; font-size: 14px; color: #6B7177; }
  .c-send { width: 40px; height: 40px; border-radius: 999px; background: #D97757;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
</style>
</head>
<body>
  <!-- LEFT: design tool artboard -->
  <div class="col l">
    <div class="artboard">
      <div class="tabbar"><div class="tab"><span class="dot"></span><span class="mono">claude.ai/design</span></div></div>
      <div class="aslot" id="slot-l"></div>
    </div>
  </div>
  <!-- RIGHT: shipped app in iPhone -->
  <div class="col r">
    <div class="iphone">
      <div class="iscreen">
        <div class="statusbar">
          <span class="clock">22:41</span>
          <span class="notch"></span>
          <span class="sicons">
            <svg width="17" height="11" viewBox="0 0 17 11" fill="#ECEDEE"><rect x="0" y="6.5" width="3" height="4" rx="0.8"/><rect x="4.4" y="4.5" width="3" height="6" rx="0.8"/><rect x="8.8" y="2.5" width="3" height="8" rx="0.8"/><rect x="13.2" y="0.5" width="3" height="10" rx="0.8" opacity="0.4"/></svg>
            <svg width="15" height="11" viewBox="0 0 16 12" fill="none" stroke="#ECEDEE" stroke-width="1.5" stroke-linecap="round"><path d="M2 4.5a9 9 0 0112 0M4.2 7a5.8 5.8 0 017.6 0M6.5 9.4a2.6 2.6 0 013 0"/></svg>
            <svg width="23" height="11" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="20" height="11" rx="3" stroke="#ECEDEE" opacity="0.5"/><rect x="2" y="2" width="14" height="8" rx="1.6" fill="#ECEDEE"/><path d="M22.5 4v4a2.2 2.2 0 000-4z" fill="#ECEDEE" opacity="0.5"/></svg>
          </span>
        </div>
        <div id="slot-r"></div>
        <div class="homebar"><span></span></div>
      </div>
    </div>
  </div>

  <div class="pill l"><span>AI 出的设计稿</span></div>
  <div class="pill r"><span>上架的 App</span></div>

<script>
function chatHTML(h) {
  return '' +
  '<div class="chat" style="height:' + h + 'px">' +
    '<div class="c-top">' +
      '<svg width="17" height="17" viewBox="0 0 18 18" fill="none" style="flex-shrink:0"><path d="M11 3L5 9l6 6" stroke="#9BA1A6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
      '<span class="ttl">cc-pocket</span>' +
      '<span class="c-badge">default</span>' +
    '</div>' +
    '<div class="c-body">' +
      '<div><div class="c-you">你</div><div class="c-t">把会话列表加上下拉刷新</div></div>' +
      '<div class="c-t">好，我给 SessionList 外层套一个下拉刷新容器，松手时重新向 daemon 拉取会话快照，先验证编译。</div>' +
      '<div class="c-tool">' +
        '<div class="row"><span class="b">⏺</span><span class="cmd"><b style="font-weight:600">Bash</b>(./gradlew :mobile:composeApp:compileKotlinDesktop)</span></div>' +
        '<div class="res"><span>⎿</span><span>BUILD SUCCESSFUL in 41s</span></div>' +
      '</div>' +
      '<div class="c-t">编译通过。刷新指示器已接上会话仓库，正在补拉取失败的兜底提示<span class="caret"></span></div>' +
    '</div>' +
    '<div class="c-comp">' +
      '<span class="c-plus"><svg width="20" height="20" viewBox="0 0 22 22" fill="none"><path d="M11 4.5v13M4.5 11h13" stroke="#9BA1A6" stroke-width="1.7" stroke-linecap="round"/></svg></span>' +
      '<span class="c-field">给 Claude 发消息</span>' +
      '<span class="c-send"><svg width="17" height="17" viewBox="0 0 18 18" fill="none"><path d="M9 14.5V4M9 4l-4.2 4.2M9 4l4.2 4.2" stroke="#0E0F11" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/></svg></span>' +
    '</div>' +
  '</div>';
}
// LEFT artboard: raw design frame (no OS chrome) — scale 420 -> 468
const sl = document.getElementById('slot-l');
sl.style.height = Math.round(880 * 468/420) + 'px';
sl.innerHTML = '<div style="transform:scale(' + (468/420) + ');transform-origin:top left">' + chatHTML(880) + '</div>';
// RIGHT shipped: status bar + home indicator eat into the same screen — scale 420 -> 448
const sr = document.getElementById('slot-r');
const rh = 880 - 20; // slightly shorter content area inside device chrome
sr.style.height = Math.round(rh * 448/420) + 'px';
sr.style.overflow = 'hidden';
sr.innerHTML = '<div style="transform:scale(' + (448/420) + ');transform-origin:top left">' + chatHTML(rh) + '</div>';
</script>
</body>
</html>
