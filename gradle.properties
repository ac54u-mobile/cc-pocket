# 6g: the iOS release link (K/N LTO devirtualization) OOMs at 2g
org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
kotlin.native.jvmArgs=-Xmx6g
org.gradle.caching=true
org.gradle.parallel=true
# Pin the JDK so ./gradlew works without setting JAVA_HOME (Homebrew openjdk@17).
org.gradle.java.home=/opt/homebrew/opt/openjdk@17
kotlin.code.style=official
android.useAndroidX=true
android.nonTransitiveRClass=true
